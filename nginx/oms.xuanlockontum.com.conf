# ──────────────────────────────────────────────────────────────
# MF-OMS Nginx — Production Config (Optimized)
# ──────────────────────────────────────────────────────────────

# Rate limiting zone — 10 req/s per IP cho API
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# ── HTTP → HTTPS redirect ──────────────────────────────────────
server {
    listen 80;
    server_name oms.xuanlockontum.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name oms.xuanlockontum.com;

    # ── SSL ──────────────────────────────────────────────────────
    ssl_certificate /etc/letsencrypt/live/oms.xuanlockontum.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oms.xuanlockontum.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Gzip Compression ────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/xhtml+xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── Security Headers ────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Block sensitive files ───────────────────────────────────
    location ~* \.(sql|env|git|bak|log|sh)$ {
        deny all;
        return 404;
    }

    # ── Next.js static assets (hashed, immutable) ───────────────
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;

        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Public static files (images, fonts, etc.) ───────────────
    location ~* \.(ico|png|jpg|jpeg|webp|avif|svg|gif|woff|woff2|ttf|eot|css|js)$ {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;

        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # ── Frontend (Next.js) ──────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Không cache HTML pages (chúng cần fresh mỗi lần)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Backend API (NestJS) ────────────────────────────────────
    location /api {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:3011;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Giới hạn body size cho import/upload
        client_max_body_size 10m;
    }
}
