services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "https://oms.xuanlockontum.com/api"
    container_name: mf_oms_web
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3010:3000"
    depends_on:
      - api
    networks:
      - oms-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: mf_oms_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3011:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - oms-network

  postgres:
    image: postgres:16-alpine
    container_name: mf_oms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: oms_user
      POSTGRES_PASSWORD: oms_pass_2025
      POSTGRES_DB: oms_db
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oms_user -d oms_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oms-network

networks:
  oms-network:
    driver: bridge

volumes:
  postgres_data:
    name: mf_oms_postgres_data
