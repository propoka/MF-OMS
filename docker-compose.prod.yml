version: "3.8"

services:
  nginx:
    image: nginx:alpine
    container_name: mf_oms_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/oms.xuanlockontum.com.conf:/etc/nginx/conf.d/default.conf
      - certbot-www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    depends_on:
      - api
    networks:
      - oms-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: mf_oms_web
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "3000"
    depends_on:
      - api
    networks:
      - oms-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: mf_oms_api
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - oms-network

  postgres:
    image: postgres:16-alpine
    container_name: mf_oms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: oms_user
      POSTGRES_PASSWORD: oms_pass_2025
      POSTGRES_DB: oms_db
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oms_user -d oms_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oms-network

  certbot:
    image: certbot/certbot
    container_name: mf_oms_certbot
    volumes:
      - certbot-www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  oms-network:
    driver: bridge

volumes:
  postgres_data:
    name: mf_oms_postgres_data
  certbot-www:
  letsencrypt:
