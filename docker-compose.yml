services:
  postgres:
    image: postgres:16-alpine
    container_name: mf_oms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: oms_user
      POSTGRES_PASSWORD: oms_pass_2025
      POSTGRES_DB: oms_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oms_user -d oms_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: mf_oms_postgres_data
